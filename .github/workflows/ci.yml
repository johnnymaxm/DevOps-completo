name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        cache: "npm"
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: app

    - name: Run tests
      run: npm test
      working-directory: app

    - name: Build Docker image
      run: |
        docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }} \
          -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest \
          .

    - name: Login Docker Hub
      run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Push Docker images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest